name: Build and deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Set image name
        id: image
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ github.sha }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over password SSH
        uses: appleboy/ssh-action@v1.2.4
        env:
          IMAGE_NAME: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ github.sha }}
          APP_PORT: ${{ vars.APP_PORT || '3001' }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH || 'holo-opensource-deploy' }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ vars.SSH_PORT || '22' }}
          command_timeout: 10m
          envs: IMAGE_NAME,IMAGE_TAG,APP_PORT,DEPLOY_PATH,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu

            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            umask 077

            cat > .env <<EOF
            IMAGE_NAME=$IMAGE_NAME
            IMAGE_TAG=$IMAGE_TAG
            APP_PORT=$APP_PORT
            EOF

            cat > docker-compose.yml <<'COMPOSE'
            services:
              holo-opensource:
                image: ${IMAGE_NAME}:${IMAGE_TAG}
                restart: unless-stopped
                ports:
                  - "${APP_PORT}:3001"
                environment:
                  NODE_ENV: production
                  PORT: 3001
                healthcheck:
                  test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
                  interval: 15s
                  timeout: 5s
                  retries: 5
                  start_period: 10s
            COMPOSE

            if [ -n "${GHCR_TOKEN:-}" ]; then
              printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker compose pull
            docker compose up -d --remove-orphans

            container_id="$(docker compose ps -q holo-opensource)"
            for attempt in $(seq 1 30); do
              status="$(docker inspect --format='{{.State.Health.Status}}' "$container_id" 2>/dev/null || true)"
              if [ "$status" = "healthy" ]; then
                docker image prune -f
                exit 0
              fi
              sleep 2
            done

            docker compose logs --tail=100 holo-opensource
            exit 1
